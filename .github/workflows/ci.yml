name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-with-version: '3.11'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          pip install ruff

      - name: Run Ruff Linter
        run: ruff check app/

  build-image:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: false # We only test the build for now, don't push to a registry yet
          tags: prof-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max