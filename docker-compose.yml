services:
  web:
    build:
      context: .
      target: runner
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/prof_db
      - VAULT_ADDR=${VAULT_ADDR:-}
      - VAULT_ROLE_ID=${VAULT_ROLE_ID:-}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID:-}
      - INOVAR_USERNAME=${INOVAR_USERNAME:-}
      - INOVAR_PASSWORD=${INOVAR_PASSWORD:-}
      - INOVAR_URL=${INOVAR_URL:-https://epralima.inovarmais.com/alunos/Inicial.wgx}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - prof-net
      - default

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=prof_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  postgres_data:

networks:
  prof-net:
    external: true
  default:
